name: Build IPA (unsigned)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen

      - name: Show build settings
        run: |
          xcodebuild -project Tracks.xcodeproj -scheme Tracks -showBuildSettings | head -50

      - name: Build .app (Debug, unsigned)
        run: |
          xcodebuild -project Tracks.xcodeproj \
            -scheme Tracks \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath ${{ runner.temp }}/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find .app
        run: find ${{ runner.temp }}/build -name "*.app" -type d

      - name: Package as IPA
        run: |
          APP=$(find ${{ runner.temp }}/build -name "Tracks.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "APP NOT FOUND!"
            exit 1
          fi
          mkdir -p ${{ runner.temp }}/ipa/Payload
          cp -R "$APP" ${{ runner.temp }}/ipa/Payload/
          cd ${{ runner.temp }}/ipa
          zip -r Tracks.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Tracks-iOS
          path: ${{ runner.temp }}/ipa/Tracks.ipa
