name: Build IPA (unsigned)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen

      - name: Build .app (unsigned)
        run: |
          xcodebuild -project Tracks.xcodeproj \
            -scheme Tracks \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ${{ runner.temp }}/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package as IPA
        run: |
          mkdir -p ${{ runner.temp }}/ipa/Payload
          cp -R ${{ runner.temp }}/build/Build/Products/Release-iphoneos/Tracks.app ${{ runner.temp }}/ipa/Payload/
          cd ${{ runner.temp }}/ipa
          zip -r Tracks.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Tracks-iOS
          path: ${{ runner.temp }}/ipa/Tracks.ipa
