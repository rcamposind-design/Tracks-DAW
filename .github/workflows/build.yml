name: Build IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Check Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen

      - name: Check project exists and list schemes
        run: |
          ls -la *.xcodeproj
          xcodebuild -list -project Tracks.xcodeproj 2>&1

      - name: Try build
        run: |
          xcodebuild -project Tracks.xcodeproj \
            -scheme Tracks \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath /tmp/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 || true

      - name: Show derived data
        run: find /tmp/build -name "*.app" -o -name "*.log" 2>/dev/null | head -20 || echo "No derived data found"

      - name: Upload full log on failure
        if: failure()
        run: |
          find /tmp -name "*.log" -type f 2>/dev/null | head -5
          xcodebuild -project Tracks.xcodeproj \
            -scheme Tracks \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath /tmp/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -100
