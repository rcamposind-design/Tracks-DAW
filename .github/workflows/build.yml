name: Build IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen

      - name: Build .app
        run: |
          xcodebuild -project Tracks.xcodeproj \
            -scheme Tracks \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath /tmp/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1

      - name: Find and Package .app
        run: |
          APP=$(find /tmp/build -name "Tracks.app" -type d | head -1)
          echo "Found: $APP"
          if [ -z "$APP" ]; then
            echo "ERROR: .app not found"
            ls -R /tmp/build 2>/dev/null | head -50
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r Tracks.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Tracks-iOS
          path: Tracks.ipa
