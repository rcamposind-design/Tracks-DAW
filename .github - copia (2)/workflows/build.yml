name: Build IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen

      - name: List project
        run: xcodebuild -list -project Tracks.xcodeproj

      - name: Build and capture log
        run: |
          xcodebuild -project Tracks.xcodeproj \
            -scheme Tracks \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath /tmp/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: Show last 50 lines
        run: tail -50 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Package .ipa
        if: success()
        run: |
          APP=$(find /tmp/build -name "Tracks.app" -type d | head -1)
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r Tracks.ipa Payload/

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Tracks-iOS
          path: Tracks.ipa
